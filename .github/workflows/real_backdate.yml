name: Super Realistic 70 Days Activity

on:
  workflow_dispatch:

jobs:
  backdate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Generate Activity
        run: |
          git config user.email "madaminjonromonov82@gmail.com"
          git config user.name "madaminjon"

          for i in {70..1}
          do
            DAY_OF_WEEK=$(date -d "$i days ago" +%u)
            CHANCE=$((RANDOM % 100))

            THRESHOLD=35
            if [ $DAY_OF_WEEK -ge 6 ]; then THRESHOLD=85; fi

            if [ $CHANCE -gt $THRESHOLD ]; then
              RANDOM_COUNT=$((1 + RANDOM % 15))

              for j in $(seq 1 $RANDOM_COUNT)
              do
                D=$(date -d "$i days ago" +%Y-%m-%dT%H:%M:%S)
                echo "Update $D $RANDOM" > activity.txt
                git add activity.txt
                GIT_AUTHOR_DATE="$D" GIT_COMMITTER_DATE="$D" git commit -m "Update $j"
              done
            fi
          done

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} main --force
